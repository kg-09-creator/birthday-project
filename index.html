<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSWS Birthday Wish Generator</title>
    
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f4ecf7;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            max-width: 450px;
            margin: 0 auto;
            border: 3px solid #ec407a;
            
            /* FORCE ALL CONTENT INTO A SINGLE VERTICAL COLUMN */
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
        }
        .party-image {
            width: 200px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 2px dashed #ec407a;
            padding: 10px;
            background-color: #fff;
        }
        button {
            background-color: #ec407a;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
        button:hover {
            background-color: #d81b60;
        }
        .text-container {
            width: 100%;
            margin: 10px 0;
        }
        #wish-text {
            font-size: 18px;
            color: #4a148c;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎂 Birthday Wish-O-Matic 🎂</h1>
        
        <!-- The image is perfectly centered inside the column -->
        <img class="party-image" src="https://hackclub.com" alt="Party Orpheus">
        
        <!-- Wrapped layout elements to strictly obey vertical stacking -->
        <div class="text-container">
            <p style="margin: 5px 0;">Wanna see a cool birthday message?</p>
            <p id="wish-text">Click the button below to generate a wish!</p>
        </div>
        
        <button onclick="generateWish()">Generate Wish ✨</button>
    </div>

    <script>
        const wishes = [
            "Happy Birthday! May your code compile on the very first try today! 🚀",
            "Wishing you a day filled with cake, confetti, and zero merge conflicts! 🎂",
            "Happy Birthday! May Orpheus bless your repository with endless green checkmarks! 🦕",
            "Have a fantastic birthday! Remember to log your hours for this awesome YSWS! 🎉",
            "Happy Birthday! May your bugs be small and your stickers be plentiful! 💎"
        ];

        function generateWish() {
            const randomIndex = Math.floor(Math.random() * wishes.length);
            document.getElementById("wish-text").innerText = wishes[randomIndex];
        }
    </script>

</body>
</html>
