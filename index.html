<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name ="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Wish Generator!</title>


    <style>
        body {
            font-family: 'Brush Script MT', cursive, monospace;
            background-color: #f4ecf7;
            text-align: center;
            padding: 50px;
            overflow-x: hidden;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            max-width: 0 auto;
            margin: 0 auto;
            border: 3px solid #ec407a;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .party-image {
            width: 200px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 2px dashed #ec407a;
            padding: 10px;
            margin-left: auto;
            margin-right: auto;
        }
        button {
            background-color: #ec407a;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            z-index: 10;
        }
        button:hover {
            background-color: #d81b60;
        }
        #wish-text {
            font-size: 18px;
            margin: 20px 0;
            min-height: 50px;
            color: #4a148c;
        }
        .css-confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: fallAnimation 1.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes fallAnimation {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(250px) translate(var(--x-drift)) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎂 Birthday Wish-O-Matic 🎂</h1>

        <img class = "party-image" src="https://rawr.hackclub.com/party_orpheus.png" alt="Orpheus Says Happy Birthday">
    
        <div class ="text-container">
        <p>Wanna see a cool birthday message?</p>
        <p id="wish-text">Click the button below to generate a wish!</p>
        </div>

        <button onclick="generateWish()">Generate Wish ✨</button>
    </div>

    <script>
        const wishes = [
            "Happy Birthday! May your code compile on the very first try today! 🔥",
            "Wishing you a day filled with cake, confetti, and zero merge conflicts! 🎂",
            "Happy Birthday! May Orpheus bless your repository with endless green checkmarks 🦖",
            "Have a fantastic birthday! May your code run with flawless perfection 🎉",
            "Happy Birthday! May the bugs in the code be small and your stickers be plentiful! 🩷",
        ];

        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if(!AudioContext) return;

            const ctx = new AudioContext();
            let osc1 = ctx.createOscillator();
            let gain1 = ctx.createGain();
            osc1.type = 'triangle';
            osc1.frequency.setValueAtTime(587.33, ctx.currentTime); 
            gain1.gain.setValueAtTime(0.1, ctx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime + 0.4);
            osc1.connect(gain1);
            gain1.connect(ctx.destination);
            osc1.start();
            osc1.stop(ctx.currentTime + 0.4);

            setTimeout(() => {
                let osc2 = ctx.createOscillator();
                    let gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(880.00, ctx.currentTime); // A5 note
                    gain2.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start();
                    osc2.stop(ctx.currentTime + 0.5);
                }, 120);

            } catch (e) {
                console.log("Audio contexts blocked by browser rules.", e);
            }
        function spawnCustomConfetti() {
            const card = document.getElementById("main-card");
            const colors = ["#ffeb3b", "#e91e63", "#00bcd4", "#4caf50", "#9c27b0", "#ff9800"];
            
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement("div");
                particle.className = "css-confetti";
                
                particle.style.left = Math.random() * 90 + 5 + "%";
                particle.style.top = "40%";
                
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const drift = (Math.random() * 120 - 60) + "px";
                particle.style.setProperty('--x-drift', drift);
                
                particle.style.animationDuration = (Math.random() * 0.8 + 0.7) + "s";
                
                card.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1500);
            }
        }

        // Central trigger orchestrating execution steps
        function generateEverything() {
            // Update Text content
            const randomIndex = Math.floor(Math.random() * wishes.length);
            document.getElementById("wish-text").innerText = wishes[randomIndex];
            
            // Run self-sufficient audio sound generator
            playSyntheticCelebrationSound();
            
            // Run self-sufficient layout confetti burst 
            spawnCustomConfetti();
        }
    </script>
</body>
</html>
